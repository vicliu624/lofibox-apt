name: Publish LoFiBox APT Repository XBuild

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_ref:
        description: "LoFiBox-Zero ref to package"
        required: true
        default: "main"
      suite:
        description: "Debian suite"
        required: true
        default: "trixie"
      preview_suffix:
        description: "Debian version suffix. Use auto to derive ~lofibox<run_number>."
        required: true
        default: "auto"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-xbuild
  cancel-in-progress: true

jobs:
  build-native-package:
    name: Build Debian package (${{ matrix.deb_arch }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - deb_arch: amd64

    steps:
      - name: Checkout LoFiBox-Zero
        uses: actions/checkout@v4
        with:
          repository: vicliu624/LoFiBox-Zero
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || 'main' }}

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apt-utils \
            autopkgtest \
            build-essential \
            cmake \
            debhelper-compat \
            desktop-file-utils \
            devscripts \
            dpkg-dev \
            libdistro-info-perl \
            libfreetype-dev \
            libx11-dev \
            libxkbcommon-dev \
            lintian \
            ninja-build \
            pkgconf \
            python3

      - name: Apply preview version suffix
        env:
          DEBEMAIL: maintainers@example.invalid
          DEBFULLNAME: LoFiBox contributors
        run: |
          current_version="$(dpkg-parsechangelog -S Version)"
          preview_suffix="${{ github.event_name == 'workflow_dispatch' && inputs.preview_suffix || 'auto' }}"
          apt_suite="${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'trixie' }}"
          package_distribution="unstable"
          if [ "$preview_suffix" = "auto" ]; then
            suffix="~lofibox${GITHUB_RUN_NUMBER}"
          else
            suffix="$preview_suffix"
          fi
          dch -b --newversion "${current_version}${suffix}" --distribution "$package_distribution" "Preview APT repository build for $apt_suite."
          dpkg-parsechangelog -S Version

      - name: Build Debian package
        run: |
          chmod +x debian/rules debian/tests/smoke
          dpkg-buildpackage -us -uc -b

      - name: Locate Debian build metadata
        run: |
          changes_file="$(find "$GITHUB_WORKSPACE/.." -maxdepth 1 -name 'lofibox_*_${{ matrix.deb_arch }}.changes' -print -quit)"
          test -n "$changes_file"
          test -s "$changes_file"
          echo "LOFIBOX_CHANGES=$changes_file" >> "$GITHUB_ENV"

      - name: Run Lintian
        run: lintian --profile debian "$LOFIBOX_CHANGES"

      - name: Run Autopkgtest Smoke
        run: |
          git clean -fdX
          sudo autopkgtest "$LOFIBOX_CHANGES" "$GITHUB_WORKSPACE" -- null

      - name: Stage Debian package artifact
        run: |
          mkdir -p package-artifacts
          cp "$GITHUB_WORKSPACE"/../lofibox_*_${{ matrix.deb_arch }}.changes package-artifacts/
          cp "$GITHUB_WORKSPACE"/../lofibox_*_${{ matrix.deb_arch }}.deb package-artifacts/
          cp "$GITHUB_WORKSPACE"/../lofibox_*_${{ matrix.deb_arch }}.buildinfo package-artifacts/

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package-${{ matrix.deb_arch }}
          if-no-files-found: error
          path: package-artifacts/*

  build-arm64-package:
    name: Build Debian package (arm64)
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout LoFiBox-Zero
        uses: actions/checkout@v4
        with:
          repository: vicliu624/LoFiBox-Zero
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || 'main' }}

      - name: Install arm64 cross build tools
        run: |
          sudo dpkg --add-architecture arm64
          sudo python3 - <<'PY'
          from pathlib import Path

          for path in Path("/etc/apt/sources.list.d").glob("*.sources"):
              text = path.read_text(encoding="utf-8")
              if "URIs:" not in text or "ubuntu" not in text:
                  continue
              stanzas = []
              for stanza in text.strip().split("\n\n"):
                  lines = stanza.splitlines()
                  if any(line.startswith("Architectures:") for line in lines):
                      stanzas.append(stanza)
                      continue
                  out = []
                  for line in lines:
                      out.append(line)
                      if line.startswith("Types:"):
                          out.append("Architectures: amd64")
                  stanzas.append("\n".join(out))
              path.write_text("\n\n".join(stanzas) + "\n", encoding="utf-8")
          PY
          cat >/tmp/ubuntu-ports.sources <<'EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble-security
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo mv /tmp/ubuntu-ports.sources /etc/apt/sources.list.d/ubuntu-ports.sources
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apt-utils \
            binutils-aarch64-linux-gnu \
            build-essential \
            cmake \
            crossbuild-essential-arm64 \
            debhelper-compat \
            desktop-file-utils \
            devscripts \
            dpkg-dev \
            libdistro-info-perl \
            libfreetype-dev:arm64 \
            libstdc++6:arm64 \
            libx11-dev:arm64 \
            libxkbcommon-dev:arm64 \
            lintian \
            ninja-build \
            pkgconf \
            python3

      - name: Apply preview version suffix
        env:
          DEBEMAIL: maintainers@example.invalid
          DEBFULLNAME: LoFiBox contributors
        run: |
          current_version="$(dpkg-parsechangelog -S Version)"
          preview_suffix="${{ github.event_name == 'workflow_dispatch' && inputs.preview_suffix || 'auto' }}"
          apt_suite="${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'trixie' }}"
          package_distribution="unstable"
          if [ "$preview_suffix" = "auto" ]; then
            suffix="~lofibox${GITHUB_RUN_NUMBER}"
          else
            suffix="$preview_suffix"
          fi
          dch -b --newversion "${current_version}${suffix}" --distribution "$package_distribution" "Preview APT repository build for $apt_suite."
          dpkg-parsechangelog -S Version

      - name: Build arm64 package
        run: |
          chmod +x debian/rules debian/tests/smoke
          export DEB_BUILD_OPTIONS="${DEB_BUILD_OPTIONS:+$DEB_BUILD_OPTIONS }nocheck"
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export PKG_CONFIG_LIBDIR="/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          dpkg-buildpackage --host-arch=arm64 -us -uc -b

      - name: Locate Debian build metadata
        run: |
          changes_file="$(find "$GITHUB_WORKSPACE/.." -maxdepth 1 -name 'lofibox_*_arm64.changes' -print -quit)"
          test -n "$changes_file"
          test -s "$changes_file"
          echo "LOFIBOX_CHANGES=$changes_file" >> "$GITHUB_ENV"

      - name: Run Lintian
        run: lintian --profile debian "$LOFIBOX_CHANGES"

      - name: Validate arm64 package
        run: |
          deb_file="$(find "$GITHUB_WORKSPACE/.." -maxdepth 1 -name 'lofibox_*_arm64.deb' -print -quit)"
          test -n "$deb_file"
          test "$(dpkg-deb -f "$deb_file" Architecture)" = "arm64"

      - name: Stage arm64 artifact
        run: |
          mkdir -p package-artifacts
          cp "$GITHUB_WORKSPACE"/../lofibox_*_arm64.changes package-artifacts/
          cp "$GITHUB_WORKSPACE"/../lofibox_*_arm64.deb package-artifacts/
          cp "$GITHUB_WORKSPACE"/../lofibox_*_arm64.buildinfo package-artifacts/

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package-arm64
          if-no-files-found: error
          path: package-artifacts/*

  build-raspi-armhf-package:
    name: Build Debian package (armhf, Raspberry Pi ARMv6)
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout LoFiBox-Zero
        uses: actions/checkout@v4
        with:
          repository: vicliu624/LoFiBox-Zero
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || 'main' }}

      - name: Install Raspberry Pi ARMv6 chroot tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binfmt-support \
            ca-certificates \
            curl \
            debootstrap \
            gnupg \
            qemu-user-static

      - name: Build Raspberry Pi ARMv6 package
        env:
          DEBEMAIL: maintainers@example.invalid
          DEBFULLNAME: LoFiBox contributors
        run: |
          set -euxo pipefail

          root="$RUNNER_TEMP/raspbian-armhf-root"
          sudo rm -rf "$root"

          curl -fsSL http://archive.raspbian.org/raspbian.public.key -o "$RUNNER_TEMP/raspbian.public.key"
          gpg --dearmor --yes -o "$RUNNER_TEMP/raspbian-archive-keyring.gpg" "$RUNNER_TEMP/raspbian.public.key"
          sudo debootstrap \
            --arch=armhf \
            --foreign \
            --keyring="$RUNNER_TEMP/raspbian-archive-keyring.gpg" \
            bookworm \
            "$root" \
            http://archive.raspbian.org/raspbian
          sudo cp /usr/bin/qemu-arm-static "$root/usr/bin/"
          sudo chroot "$root" /debootstrap/debootstrap --second-stage

          sudo mount -t proc proc "$root/proc"
          sudo mount --bind /sys "$root/sys"
          sudo mount --bind /dev "$root/dev"
          trap 'sudo umount -R "$root/proc" || true; sudo umount -R "$root/sys" || true; sudo umount -R "$root/dev" || true' EXIT

          sudo chroot "$root" /bin/bash -lc '
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              apt-utils \
              binutils \
              build-essential \
              ca-certificates \
              cmake \
              debhelper-compat \
              desktop-file-utils \
              devscripts \
              dpkg-dev \
              libdistro-info-perl \
              libfreetype-dev \
              libx11-dev \
              libxkbcommon-dev \
              lintian \
              ninja-build \
              pkgconf \
              python3
          '

          sudo mkdir -p "$root/work/LoFiBox-Zero"
          tar \
            --exclude=.git \
            --exclude=.cache \
            --exclude=.tmp \
            --exclude=build \
            --exclude=obj-* \
            --exclude=out \
            --exclude=runs \
            -C "$GITHUB_WORKSPACE" \
            -cf - . | sudo tar -C "$root/work/LoFiBox-Zero" -xf -

          sudo chroot "$root" /bin/bash -lc '
            set -euxo pipefail
            cd /work/LoFiBox-Zero
            export DEBIAN_FRONTEND=noninteractive
            export DEBEMAIL=maintainers@example.invalid
            export DEBFULLNAME="LoFiBox contributors"
            current_version="$(dpkg-parsechangelog -S Version)"
            preview_suffix="${{ github.event_name == 'workflow_dispatch' && inputs.preview_suffix || 'auto' }}"
            apt_suite="${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'trixie' }}"
            package_distribution="unstable"
            if [ "$preview_suffix" = "auto" ]; then
              suffix="~lofibox${{ github.run_number }}"
            else
              suffix="$preview_suffix"
            fi
            dch -b --newversion "${current_version}${suffix}" --distribution "$package_distribution" "Preview APT repository build for $apt_suite."
            dpkg-parsechangelog -S Version

            chmod +x debian/rules debian/tests/smoke
            export DEB_BUILD_OPTIONS="${DEB_BUILD_OPTIONS:+$DEB_BUILD_OPTIONS }nocheck"
            dpkg-buildpackage -us -uc -b

            changes_file="$(find /work -maxdepth 1 -name "lofibox_*_armhf.changes" -print -quit)"
            test -n "$changes_file"
            test -s "$changes_file"
            lintian --profile debian "$changes_file"

            deb_file="$(find /work -maxdepth 1 -name "lofibox_*_armhf.deb" -print -quit)"
            test -n "$deb_file"
            test "$(dpkg-deb -f "$deb_file" Architecture)" = "armhf"
            tmp_dir="$(mktemp -d)"
            dpkg-deb -x "$deb_file" "$tmp_dir"
            readelf -A "$tmp_dir/usr/bin/lofibox" | tee /tmp/lofibox-armhf-attributes.txt
            grep -Eq "Tag_CPU_arch: v6|Tag_CPU_name: \"6\"" /tmp/lofibox-armhf-attributes.txt
          '

          mkdir -p package-artifacts
          sudo cp "$root"/work/lofibox_*_armhf.changes package-artifacts/
          sudo cp "$root"/work/lofibox_*_armhf.deb package-artifacts/
          sudo cp "$root"/work/lofibox_*_armhf.buildinfo package-artifacts/
          sudo chown -R "$USER:$USER" package-artifacts

      - name: Upload Raspberry Pi armhf artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package-armhf
          if-no-files-found: error
          path: package-artifacts/*

  publish-pages:
    name: Publish website and APT repository
    needs:
      - build-native-package
      - build-arm64-package
      - build-raspi-armhf-package
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout APT repo
        uses: actions/checkout@v4
        with:
          path: lofibox-apt

      - name: Checkout LoFiBox-Zero
        uses: actions/checkout@v4
        with:
          repository: vicliu624/LoFiBox-Zero
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || 'main' }}
          path: LoFiBox-Zero

      - name: Download Debian package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: debian-package-*
          path: debian-artifacts
          merge-multiple: true

      - name: Install publishing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            aptly \
            apt-utils \
            dpkg-dev \
            gnupg \
            python3

      - name: Import APT signing key
        env:
          LOFIBOX_APT_GPG_PRIVATE_KEY: ${{ secrets.LOFIBOX_APT_GPG_PRIVATE_KEY }}
          LOFIBOX_APT_GPG_KEY_ID: ${{ secrets.LOFIBOX_APT_GPG_KEY_ID }}
        run: |
          if [ -z "$LOFIBOX_APT_GPG_PRIVATE_KEY" ]; then
            echo "::error::Missing GitHub secret LOFIBOX_APT_GPG_PRIVATE_KEY."
            exit 1
          fi
          if [ -z "$LOFIBOX_APT_GPG_KEY_ID" ]; then
            echo "::error::Missing GitHub secret LOFIBOX_APT_GPG_KEY_ID."
            exit 1
          fi
          install -d -m 0700 "$HOME/.gnupg"

          key_input="$RUNNER_TEMP/lofibox-apt-private-key.input"
          key_material="$RUNNER_TEMP/lofibox-apt-private-key.asc"
          printf '%s' "$LOFIBOX_APT_GPG_PRIVATE_KEY" > "$key_input"

          if grep -q '\\n' "$key_input"; then
            python3 - "$key_input" "$key_material" <<'PY'
          from pathlib import Path
          import sys
          source = Path(sys.argv[1])
          target = Path(sys.argv[2])
          target.write_text(source.read_text(encoding="utf-8").replace("\\n", "\n"), encoding="utf-8")
          PY
          elif grep -q -- '-----BEGIN PGP ' "$key_input"; then
            cp "$key_input" "$key_material"
          else
            if ! base64 -d "$key_input" > "$key_material"; then
              echo "::error::LOFIBOX_APT_GPG_PRIVATE_KEY is neither ASCII-armored OpenPGP material nor base64-encoded OpenPGP material."
              exit 1
            fi
          fi

          if ! gpg --batch --import "$key_material"; then
            echo "::error::LOFIBOX_APT_GPG_PRIVATE_KEY is not an importable OpenPGP private key. Use an ASCII-armored private key or base64-encoded OpenPGP private key material."
            exit 1
          fi

          imported_fingerprint="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ -z "$imported_fingerprint" ]; then
            echo "::error::LOFIBOX_APT_GPG_PRIVATE_KEY did not import a secret key. Make sure the secret contains a private key, not only the public key."
            exit 1
          fi

          if gpg --batch --list-secret-keys "$LOFIBOX_APT_GPG_KEY_ID" >/dev/null 2>&1; then
            signing_key="$LOFIBOX_APT_GPG_KEY_ID"
          else
            echo "::warning::LOFIBOX_APT_GPG_KEY_ID did not match the imported secret key. Falling back to the imported fingerprint."
            signing_key="$imported_fingerprint"
          fi

          echo "LOFIBOX_IMPORTED_GPG_KEY_ID=$signing_key" >> "$GITHUB_ENV"
          rm -f "$key_input" "$key_material"

      - name: Validate Debian package artifacts
        run: |
          set -euxo pipefail
          find debian-artifacts -maxdepth 2 -type f | sort
          mapfile -t changes_files < <(find debian-artifacts -name 'lofibox_*_*.changes' -type f | sort)
          printf '%s\n' "${changes_files[@]}" > "$RUNNER_TEMP/lofibox-changes-files.txt"

          if [ "${#changes_files[@]}" -ne 3 ]; then
            echo "::error::Expected exactly amd64, arm64, and armhf .changes files; found ${#changes_files[@]}."
            printf '  %s\n' "${changes_files[@]}"
            exit 1
          fi

          for arch in amd64 arm64 armhf; do
            if ! grep -Eq "_${arch}\.changes$" "$RUNNER_TEMP/lofibox-changes-files.txt"; then
              echo "::error::Missing $arch .changes artifact."
              exit 1
            fi
            if ! find debian-artifacts -name "lofibox_*_${arch}.deb" -type f | grep -q .; then
              echo "::error::Missing $arch .deb artifact."
              exit 1
            fi
            if ! find debian-artifacts -name "lofibox_*_${arch}.buildinfo" -type f | grep -q .; then
              echo "::error::Missing $arch .buildinfo artifact."
              exit 1
            fi
          done

      - name: Build Pages artifact
        env:
          LOFIBOX_APT_GPG_KEY_ID: ${{ secrets.LOFIBOX_APT_GPG_KEY_ID }}
          LOFIBOX_APT_GPG_PASSPHRASE: ${{ secrets.LOFIBOX_APT_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          suite="${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'trixie' }}"
          signing_key="${LOFIBOX_IMPORTED_GPG_KEY_ID:-$LOFIBOX_APT_GPG_KEY_ID}"
          if [ -z "$signing_key" ]; then
            echo "::error::No APT signing key id is available after importing LOFIBOX_APT_GPG_PRIVATE_KEY."
            exit 1
          fi

          passphrase_args=()
          gpg_sign_args=(--batch --yes --local-user "$signing_key" --detach-sign)
          if [ -n "${LOFIBOX_APT_GPG_PASSPHRASE:-}" ]; then
            passphrase_file="$RUNNER_TEMP/lofibox-apt-gpg-passphrase"
            printf '%s' "$LOFIBOX_APT_GPG_PASSPHRASE" > "$passphrase_file"
            chmod 0600 "$passphrase_file"
            passphrase_args+=(--gpg-passphrase-file "$passphrase_file")
            gpg_sign_args+=(--pinentry-mode loopback --passphrase-file "$passphrase_file")
          fi

          printf 'LoFiBox APT signing probe\n' > "$RUNNER_TEMP/signing-probe.txt"
          if ! gpg "${gpg_sign_args[@]}" --output "$RUNNER_TEMP/signing-probe.sig" "$RUNNER_TEMP/signing-probe.txt"; then
            echo "::error::The imported APT signing key cannot sign non-interactively. If the key is passphrase-protected, add repository secret LOFIBOX_APT_GPG_PASSPHRASE; otherwise export an unprotected CI signing subkey."
            exit 1
          fi

          changes_args=()
          while IFS= read -r changes_file; do
            changes_args+=(--changes "$changes_file")
          done < "$RUNNER_TEMP/lofibox-changes-files.txt"

          chmod +x lofibox-apt/scripts/*.sh LoFiBox-Zero/scripts/*.sh
          lofibox-apt/scripts/build-public-artifact.sh \
            --site lofibox-apt/site \
            --lofibox-zero LoFiBox-Zero \
            --suite "$suite" \
            --component main \
            --architectures amd64,arm64,armhf \
            --output public \
            --repo-name lofibox-preview \
            --origin LoFiBox \
            --label "LoFiBox Preview" \
            --gpg-key "$signing_key" \
            "${passphrase_args[@]}" \
            "${changes_args[@]}"

      - name: Validate Pages and APT repository artifact
        run: |
          set -euxo pipefail
          suite="${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'trixie' }}"
          test -f public/index.html
          test -s public/lofibox-archive-keyring.pgp
          test -f "public/debian/dists/$suite/InRelease"
          test -f "public/debian/dists/$suite/Release"
          for arch in amd64 arm64 armhf; do
            test -s "public/debian/dists/$suite/main/binary-$arch/Packages"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
