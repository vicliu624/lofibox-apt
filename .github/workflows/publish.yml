name: Publish LoFiBox APT Repository

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      source_ref:
        description: "LoFiBox-Zero ref to package"
        required: true
        default: "main"
      suite:
        description: "Debian suite"
        required: true
        default: "trixie"
      preview_suffix:
        description: "Debian version suffix. Use auto to derive ~lofibox<run_number>."
        required: true
        default: "auto"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout APT repo
        uses: actions/checkout@v4
        with:
          path: lofibox-apt

      - name: Checkout LoFiBox-Zero
        uses: actions/checkout@v4
        with:
          repository: vicliu624/LoFiBox-Zero
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || 'main' }}
          path: LoFiBox-Zero

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            aptly \
            appstream \
            apt-utils \
            autopkgtest \
            build-essential \
            cmake \
            debhelper-compat \
            desktop-file-utils \
            devscripts \
            dpkg-dev \
            gnupg \
            libfreetype6-dev \
            libx11-dev \
            libxkbcommon-dev \
            lintian \
            ninja-build \
            pkgconf \
            python3

      - name: Import APT signing key
        env:
          LOFIBOX_APT_GPG_PRIVATE_KEY: ${{ secrets.LOFIBOX_APT_GPG_PRIVATE_KEY }}
          LOFIBOX_APT_GPG_KEY_ID: ${{ secrets.LOFIBOX_APT_GPG_KEY_ID }}
        run: |
          test -n "$LOFIBOX_APT_GPG_PRIVATE_KEY"
          test -n "$LOFIBOX_APT_GPG_KEY_ID"
          install -d -m 0700 "$HOME/.gnupg"

          key_input="$RUNNER_TEMP/lofibox-apt-private-key.input"
          key_material="$RUNNER_TEMP/lofibox-apt-private-key.asc"
          printf '%s' "$LOFIBOX_APT_GPG_PRIVATE_KEY" > "$key_input"

          if grep -q '\\n' "$key_input"; then
            python3 - "$key_input" "$key_material" <<'PY'
from pathlib import Path
import sys
source = Path(sys.argv[1])
target = Path(sys.argv[2])
target.write_text(source.read_text(encoding="utf-8").replace("\\n", "\n"), encoding="utf-8")
PY
          elif grep -q -- '-----BEGIN PGP PRIVATE KEY BLOCK-----' "$key_input"; then
            cp "$key_input" "$key_material"
          else
            base64 -d "$key_input" > "$key_material"
          fi

          gpg --batch --import "$key_material"
          gpg --batch --list-secret-keys "$LOFIBOX_APT_GPG_KEY_ID" >/dev/null
          rm -f "$key_input" "$key_material"

      - name: Apply preview version suffix
        working-directory: LoFiBox-Zero
        env:
          DEBEMAIL: maintainers@example.invalid
          DEBFULLNAME: LoFiBox contributors
        run: |
          current_version="$(dpkg-parsechangelog -S Version)"
          preview_suffix="${{ github.event_name == 'workflow_dispatch' && inputs.preview_suffix || 'auto' }}"
          suite="${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'trixie' }}"
          if [ "$preview_suffix" = "auto" ]; then
            suffix="~lofibox${GITHUB_RUN_NUMBER}"
          else
            suffix="$preview_suffix"
          fi
          dch --newversion "${current_version}${suffix}" --distribution "$suite" "Preview APT repository build."
          dpkg-parsechangelog -S Version

      - name: Build Debian package
        working-directory: LoFiBox-Zero
        run: |
          chmod +x debian/rules debian/tests/smoke
          dpkg-buildpackage -us -uc -b

      - name: Locate Debian build metadata
        run: |
          changes_file="$(find "$GITHUB_WORKSPACE" -maxdepth 1 -name 'lofibox_*_amd64.changes' -print -quit)"
          test -n "$changes_file"
          test -s "$changes_file"
          echo "LOFIBOX_CHANGES=$changes_file" >> "$GITHUB_ENV"

      - name: Run Lintian
        run: lintian "$LOFIBOX_CHANGES"

      - name: Run Autopkgtest Smoke
        run: |
          git -C LoFiBox-Zero clean -fdX
          sudo autopkgtest "$LOFIBOX_CHANGES" LoFiBox-Zero -- null

      - name: Build Pages artifact
        env:
          LOFIBOX_APT_GPG_KEY_ID: ${{ secrets.LOFIBOX_APT_GPG_KEY_ID }}
        run: |
          suite="${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'trixie' }}"
          test -n "$LOFIBOX_APT_GPG_KEY_ID"
          chmod +x lofibox-apt/scripts/*.sh
          lofibox-apt/scripts/build-public-artifact.sh \
            --site lofibox-apt/site \
            --lofibox-zero LoFiBox-Zero \
            --suite "$suite" \
            --component main \
            --output public \
            --repo-name lofibox-preview \
            --origin LoFiBox \
            --label "LoFiBox Preview" \
            --gpg-key "$LOFIBOX_APT_GPG_KEY_ID" \
            --changes "$LOFIBOX_CHANGES"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
